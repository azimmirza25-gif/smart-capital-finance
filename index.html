<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Credit & Loan Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 31, 49, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-green: #00e676;
            --accent-green: #00c853;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        nav { width: 100%; max-width: 1200px; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--primary-green); }
        .badge { background: rgba(0, 230, 118, 0.1); color: var(--primary-green); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; border: 1px solid rgba(0, 230, 118, 0.2); }

        .hero { text-align: center; margin: 1.5rem 1rem 2.5rem; max-width: 750px; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; }
        .hero h1 span { color: var(--primary-green); }

        .app-container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 0 1.5rem; margin-bottom: 4rem; }
        @media (max-width: 768px) { .app-container { grid-template-columns: 1fr; } }

        .glass-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 2rem; backdrop-filter: blur(16px); }
        .input-group { margin-bottom: 1.2rem; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 0.5rem; }
        .input-group input, .input-group select { width: 100%; padding: 0.9rem; background: #0f172a; border: 1px solid var(--border-color); border-radius: 12px; color: #fff; outline: none; }

        .btn-glow { width: 100%; padding: 1.1rem; background: linear-gradient(135deg, #00e676, #00c853); border: none; border-radius: 12px; color: #000; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: all 0.3s; }
        .btn-glow:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Quick<span>Loan</span></div>
        <div class="badge">⚡ Instant Approval</div>
    </nav>

    <section class="hero">
        <h1>Apply for Instant Loan Up To <span>₹10,000,000</span></h1>
    </section>

    <div class="app-container">
        <!-- Form Section -->
        <div class="glass-card" style="grid-column: span 2; max-width: 600px; margin: 0 auto; width: 100%;">
            <h2 style="margin-bottom: 1.5rem;">📋 Eligibility Verification</h2>

            <form id="loanForm">
                <div class="input-group">
                    <label>Full Name (PAN Name)</label>
                    <input type="text" id="custName" placeholder="e.g. Rahul Sharma" required>
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="custMobile" placeholder="10-digit number" pattern="[0-9]{10}" required>
                </div>

                <div class="input-group">
                    <label>Employment Type</label>
                    <select id="custEmployment" required>
                        <option value="Salaried">Salaried Employee</option>
                        <option value="Self-Employed">Self-Employed / Business</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Monthly Salary (₹)</label>
                    <input type="number" id="custIncome" placeholder="e.g. 35000" required>
                </div>

                <div class="input-group">
                    <label>Loan Amount Needed (₹)</label>
                    <input type="number" id="loanAmount" placeholder="e.g. 200000" required>
                </div>

                <button type="submit" id="submitBtn" class="btn-glow">
                    Submit & Continue to WhatsApp 💬
                </button>
            </form>
        </div>
    </div>

    <script>
        // 1. 📲 आपका व्हाट्सएप नंबर (देश कोड के साथ, जैसे 91)
        const WHATSAPP_NUMBER = "919876543210"; 

        // 2. 🔌 आपकी API का Endpoint URL
        const API_ENDPOINT = "https://your-domain.com/api/leads/submit"; 

        // 3. 🔑 अगर API में Auth Token / API Key है (ऑप्शनल)
        const API_KEY = "YOUR_API_KEY_HERE";

        document.getElementById('loanForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            // फॉर्म डेटा इकट्ठा करें
            const leadData = {
                name: document.getElementById('custName').value,
                mobile: document.getElementById('custMobile').value,
                employment_type: document.getElementById('custEmployment').value,
                monthly_income: document.getElementById('custIncome').value,
                requested_amount: document.getElementById('loanAmount').value,
                source: "Website Landing Page"
            };

            // -------------------------------------------------------------
            // STEP 1: API Integration (फायर एंड फॉरगेट / Async Request)
            // -------------------------------------------------------------
            try {
                // अपनी API/CRM पर डेटा भेजें
                await fetch(API_ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}` // आवश्यकतानुसार हटा/बदल सकते हैं
                    },
                    body: JSON.stringify(leadData)
                });
                console.log("Lead successfully submitted to API!");
            } catch (error) {
                // अगर API फ़ेल भी हो जाए तो भी यूजर का व्हाट्सएप अनुभव नहीं रुकेगा
                console.error("API Integration Error:", error);
            }

            // -------------------------------------------------------------
            // STEP 2: WhatsApp Redirect
            // -------------------------------------------------------------
            let message = `🔥 *New Loan Lead Inquiry* 🔥%0A%0A` +
                          `👤 *Name:* ${leadData.name}%0A` +
                          `📞 *Mobile:* ${leadData.mobile}%0A` +
                          `💼 *Job Type:* ${leadData.employment_type}%0A` +
                          `💵 *Monthly Income:* ₹${leadData.monthly_income}%0A` +
                          `📌 *Required Amount:* ₹${leadData.requested_amount}`;

            let whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;

            // बटन वापस रीसेट करें और व्हाट्सएप खोलें
            submitBtn.innerText = "Submit & Continue to WhatsApp 💬";
            submitBtn.disabled = false;

            window.open(whatsappUrl, '_blank');
        });
    </script>
</body>
</html>
