<!DOCTYPE html>
<html>
<head>
<title>Smart Capital Loans</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f8ff;
}
.header{
    background:#0047ab;
    color:white;
    padding:20px;
    text-align:center;
}
.hero{
    padding:40px;
    text-align:center;
}
button{
    background:#0047ab;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:5px;
    font-size:18px;
}
.form-box{
    background:white;
    width:90%;
    max-width:400px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}
input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
}
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>

<body>

<div class="header">
<h1>Smart Capital Loans</h1>
<p>Instant Personal & Consumer Loans</p>
</div>

<div class="hero">
<h2>Get Loan Assistance Quickly</h2>
<p>Easy Documentation | Fast Eligibility Check</p>
<button>Apply Now</button>
</div>


<div class="form-box">

<h2>Loan Enquiry</h2>

<input type="text" placeholder="Full Name">

<input type="number" placeholder="Mobile Number">

<input type="text" placeholder="City">

<select>
<option>Select Loan Type</option>
<option>Personal Loan</option>
<option>Consumer Loan</option>
<option>Business Loan</option>
</select>

<input type="number" placeholder="Loan Amount">

<button onclick="submitForm()">Submit</button>

</div>


<footer>
<p>© 2026 Smart Capital Loans</p>
</footer>


<script>
function submitForm(){
alert("Thank you! Our loan team will contact you soon.");
}
</script>

</body>
</html>
