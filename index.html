<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Capital Finance - EMI Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:#fff;
    padding:20px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
}
input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}
button{
    background:#007bff;
    color:#fff;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
#result{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">
<h2>EMI Calculator</h2>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="years" placeholder="Loan Tenure (Years)">

<button onclick="calculateEMI()">Calculate EMI</button>

<div id="result"></div>
</div>

<script>
function calculateEMI(){

let P = parseFloat(document.getElementById("loan").value);
let annualRate = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);

if(isNaN(P) || isNaN(annualRate) || isNaN(years)){
    document.getElementById("result").innerHTML="Please enter all values.";
    return;
}

let R = annualRate / 12 / 100;
let N = years * 12;

let EMI = (P * R * Math.pow(1 + R, N)) /
          (Math.pow(1 + R, N) - 1);

document.getElementById("result").innerHTML =
"Monthly EMI: ₹" + EMI.toFixed(2);

}
</script>

</body>
</html>
